<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake — Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/games.css" />
    <style>
        body {
            overflow: hidden;
        }

        /* Force nav to always show glass — no scroll on game pages */
        nav {
            background: rgba(8, 13, 26, 0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 1px 0 var(--border);
        }

        .game-viewport {
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            padding-top: 66px;
            /* fixed nav height */
        }

        /* ── HUD ── */
        .hud {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 28px;
            background: rgba(13, 21, 38, 0.9);
            backdrop-filter: blur(8px);
            flex-shrink: 0;
        }

        .hud-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 72px;
        }

        .hud-label {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text3);
        }

        .hud-val {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1.2;
        }

        .hud-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text2);
            letter-spacing: 0.5px;
        }

        /* ── Canvas area ── */
        .canvas-wrap {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        #game-canvas {
            display: block;
        }

        /* ── Overlay (start / pause / game-over) ── */
        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: rgba(8, 13, 26, 0.82);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        #overlay.hidden {
            display: none;
        }

        .ov-emoji {
            font-size: 3.2rem;
            line-height: 1;
        }

        .ov-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
        }

        .ov-sub {
            font-size: 0.88rem;
            color: var(--text2);
            text-align: center;
            max-width: 340px;
            line-height: 1.6;
        }

        /* ── Controls hint ── */
        .hints {
            position: absolute;
            bottom: 12px;
            right: 16px;
            display: flex;
            gap: 10px;
            pointer-events: none;
        }

        .hint {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.68rem;
            color: var(--text3);
        }

        .k {
            display: inline-block;
            padding: 1px 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text2);
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="game-viewport">
        <div class="hud">
            <div class="hud-group">
                <div class="hud-label">Score</div>
                <div class="hud-val" id="score">0</div>
            </div>
            <div class="hud-title">🐍 Snake</div>
            <div class="hud-group">
                <div class="hud-label">Best</div>
                <div class="hud-val" id="best">0</div>
            </div>
        </div>

        <div class="canvas-wrap">
            <canvas id="game-canvas"></canvas>

            <div id="overlay">
                <div class="ov-emoji" id="ov-emoji">🐍</div>
                <div class="ov-title" id="ov-title">Snake</div>
                <div class="ov-sub" id="ov-sub">
                    Use arrow keys or WASD to move.<br>Space to pause / resume.
                </div>
                <button class="btn btn-p" id="ov-btn" style="margin-top:0.5rem">
                    <span class="material-icons-round" style="font-size:17px">play_arrow</span>Start Game
                </button>
            </div>

            <div class="hints">
                <span class="hint"><span class="k">↑↓←→</span> / <span class="k">WASD</span> move</span>
                <span class="hint"><span class="k">Space</span> pause</span>
            </div>
        </div>
    </div>

    <script src="../assets/js/games.js"></script>
    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');
        const ovEmoji = document.getElementById('ov-emoji');
        const ovTitle = document.getElementById('ov-title');
        const ovSub = document.getElementById('ov-sub');
        const ovBtn = document.getElementById('ov-btn');

        const CELL = 20;
        const SPEED = 130; // ms per step

        let cols, rows, snake, dir, nextDir, food, score, best, ticker;
        let state = 'idle'; // idle | running | paused | dead
        best = 0;

        // ── Sizing ──────────────────────────────────────────────
        function resize() {
            const wrap = canvas.parentElement;
            canvas.width = Math.floor(wrap.clientWidth / CELL) * CELL;
            canvas.height = Math.floor(wrap.clientHeight / CELL) * CELL;
            cols = canvas.width / CELL;
            rows = canvas.height / CELL;
        }

        // ── Init game state ──────────────────────────────────────
        function init() {
            const mx = Math.floor(cols / 2), my = Math.floor(rows / 2);
            snake = [{ x: mx, y: my }, { x: mx - 1, y: my }, { x: mx - 2, y: my }];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            scoreEl.textContent = 0;
            food = randomFood();
        }

        function randomFood() {
            let cell;
            do {
                cell = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
            } while (snake.some(s => s.x === cell.x && s.y === cell.y));
            return cell;
        }

        // ── Drawing ──────────────────────────────────────────────
        function fillRR(x, y, w, h, r) {
            ctx.beginPath();
            if (ctx.roundRect) ctx.roundRect(x, y, w, h, r);
            else ctx.rect(x, y, w, h);
            ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Subtle grid
            ctx.strokeStyle = 'rgba(255,255,255,0.022)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= canvas.width; x += CELL) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += CELL) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // Food — cyan glow
            ctx.shadowColor = '#00E5FF';
            ctx.shadowBlur = 14;
            ctx.fillStyle = '#00E5FF';
            fillRR(food.x * CELL + 3, food.y * CELL + 3, CELL - 6, CELL - 6, 4);
            ctx.shadowBlur = 0;

            // Snake segments
            snake.forEach((seg, i) => {
                const alpha = 1 - (i / snake.length) * 0.55;
                ctx.fillStyle = i === 0 ? '#5C9EFF' : `rgba(41,121,255,${(alpha * 0.85).toFixed(2)})`;
                ctx.shadowColor = i === 0 ? 'rgba(92,158,255,0.55)' : 'transparent';
                ctx.shadowBlur = i === 0 ? 10 : 0;
                fillRR(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 5);
            });
            ctx.shadowBlur = 0;
        }

        // ── Game tick ────────────────────────────────────────────
        function step() {
            dir = { ...nextDir };
            const head = {
                x: (snake[0].x + dir.x + cols) % cols,
                y: (snake[0].y + dir.y + rows) % rows,
            };

            // Self-collision → game over
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                clearInterval(ticker);
                state = 'dead';
                if (score > best) { best = score; bestEl.textContent = best; }
                showOverlay('💀', 'Game Over', `You scored ${score}. Press Space or click to try again.`, 'Try Again');
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = score;
                food = randomFood();
            } else {
                snake.pop();
            }

            draw();
        }

        // ── Overlay helpers ──────────────────────────────────────
        function showOverlay(emoji, title, sub, btnLabel) {
            ovEmoji.textContent = emoji;
            ovTitle.textContent = title;
            ovSub.innerHTML = sub;
            ovBtn.innerHTML = `<span class="material-icons-round" style="font-size:17px">play_arrow</span>${btnLabel}`;
            overlay.classList.remove('hidden');
        }

        function startGame() {
            clearInterval(ticker);
            resize();
            init();
            overlay.classList.add('hidden');
            state = 'running';
            ticker = setInterval(step, SPEED);
            draw();
        }

        function togglePause() {
            if (state === 'running') {
                state = 'paused';
                clearInterval(ticker);
                showOverlay('⏸', 'Paused', 'Press Space or click to continue.', 'Resume');
            } else if (state === 'paused') {
                state = 'running';
                overlay.classList.add('hidden');
                ticker = setInterval(step, SPEED);
            }
        }

        // ── Keyboard controls ────────────────────────────────────
        const KEY_DIR = {
            ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
            ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
            ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
            ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
        };

        document.addEventListener('keydown', e => {
            if (e.key === ' ') {
                e.preventDefault();
                if (state === 'idle' || state === 'dead') startGame();
                else togglePause();
                return;
            }
            if (state !== 'running') return;
            const nd = KEY_DIR[e.key];
            if (!nd) return;
            if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd; // block 180° reversal
            if (e.key.startsWith('Arrow')) e.preventDefault();
        });

        // ── Touch / swipe controls ───────────────────────────────
        let touchStart = null;

        canvas.addEventListener('touchstart', e => {
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            if (!touchStart) return;
            if (state === 'idle' || state === 'dead') { startGame(); return; }
            if (state !== 'running') { togglePause(); return; }

            const dx = e.changedTouches[0].clientX - touchStart.x;
            const dy = e.changedTouches[0].clientY - touchStart.y;
            touchStart = null;

            if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return; // tap = pause
            const nd = Math.abs(dx) > Math.abs(dy)
                ? (dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 })
                : (dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
            if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
        }, { passive: false });

        // ── Overlay button ───────────────────────────────────────
        ovBtn.addEventListener('click', () => {
            if (state === 'idle' || state === 'dead') startGame();
            else togglePause();
        });

        // ── Resize ───────────────────────────────────────────────
        window.addEventListener('resize', () => {
            resize();
            if (state === 'running' || state === 'paused') {
                clearInterval(ticker);
                init();
                draw();
                if (state === 'running') ticker = setInterval(step, SPEED);
            } else {
                draw();
            }
        });

        // ── Boot ─────────────────────────────────────────────────
        resize();
        draw(); // draw empty grid immediately so canvas isn't blank
    </script>
</body>

</html>
