<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<title>Flappy Bird — Games</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="/assets/css/games.css" />
	<style>
		html,
		body {
			overflow: hidden;
			height: 100%;
			width: 100%;
		}

		body {
			position: fixed;
			inset: 0;
			touch-action: none;
		}

		/* Force nav glass — no scroll on game pages */
		nav {
			background: rgba(8, 13, 26, 0.92);
			backdrop-filter: blur(18px);
			-webkit-backdrop-filter: blur(18px);
			box-shadow: 0 1px 0 var(--border);
		}

		/* Ambient background */
		body::before {
			content: '';
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 0;
			background:
				radial-gradient(ellipse 80% 60% at 70% 40%, rgba(41, 121, 255, 0.14) 0%, transparent 70%),
				radial-gradient(ellipse 45% 45% at 15% 85%, rgba(0, 229, 255, 0.08) 0%, transparent 60%);
		}

		.game-viewport {
			flex-direction: column;
			align-items: stretch;
			justify-content: flex-start;
			width: 100vw;
			height: 100dvh;
			padding-top: 66px;
		}

		.canvas-wrap {
			flex: 1 1 auto;
			width: 100%;
			min-height: 0;
			position: relative;
			overflow: hidden;
		}

		#game-canvas {
			display: block;
			width: 100%;
			height: 100%;
		}

		/* Overlay */
		#overlay {
			position: absolute;
			inset: 0;
			z-index: 10;
			gap: 0.85rem;
			padding: 18px;
			background: rgba(8, 13, 26, 0.82);
			backdrop-filter: blur(6px);
			-webkit-backdrop-filter: blur(6px);
		}

		#overlay.hidden {
			display: none !important;
		}

		.ov-emoji {
			font-size: clamp(2.1rem, 8vw, 3.2rem);
			line-height: 1;
		}

		.ov-title {
			font-size: clamp(1.15rem, 4vw, 1.5rem);
			font-weight: 800;
			color: var(--text);
		}

		.ov-sub {
			font-size: 0.85rem;
			color: var(--text2);
			text-align: center;
			max-width: min(440px, 92vw);
			line-height: 1.5;
		}

		/* Controls hint */
		.hints {
			position: absolute;
			bottom: 12px;
			right: 16px;
			gap: 8px;
			pointer-events: none;
			z-index: 5;
		}

		.hint {
			gap: 4px;
			font-size: 0.68rem;
			color: var(--text3);
		}

		.k {
			display: inline-block;
			padding: 1px 6px;
			background: var(--surface2);
			border: 1px solid var(--border);
			border-radius: 4px;
			font-family: monospace;
			font-size: 0.7rem;
			color: var(--text2);
		}

		@media (max-width: 640px) {
			.hints {
				display: none !important;
			}
		}
	</style>
</head>

<body>
	<div id="header-placeholder"></div>

	<div class="game-viewport">
		<div class="canvas-wrap">
			<canvas id="game-canvas"></canvas>

			<div id="overlay" class="d-flex flex-column align-items-center justify-content-center">
				<div class="ov-emoji" id="ov-emoji">🐦</div>
				<div class="ov-title" id="ov-title">Flappy Bird</div>
				<div class="ov-sub" id="ov-sub">Tap or press <strong>Space</strong> to flap.<br>Thread through the pipes without crashing.</div>
				<button class="btn btn-p d-inline-flex align-items-center gap-2" id="ov-btn" style="margin-top:0.35rem">
					<span class="material-icons-round" style="font-size:17px">play_arrow</span>Start Game
				</button>
			</div>

			<div class="hints d-flex flex-column align-items-end">
				<span class="hint d-inline-flex align-items-center"><span class="k">Space</span>&nbsp;flap</span>
				<span class="hint d-inline-flex align-items-center"><span class="k">Tap</span>&nbsp;flap (mobile)</span>
			</div>
		</div>
	</div>

	<script src="/assets/js/games.js"></script>
	<script>
		const canvas = document.getElementById('game-canvas');
		const ctx = canvas.getContext('2d');
		const overlay = document.getElementById('overlay');
		const ovEmoji = document.getElementById('ov-emoji');
		const ovTitle = document.getElementById('ov-title');
		const ovSub = document.getElementById('ov-sub');
		const ovBtn = document.getElementById('ov-btn');

		// ── Constants ────────────────────────────────────────────
		const GRAVITY     = 0.4;
		const FLAP_VY     = -7;
		const PIPE_SPEED  = 2.5;
		const PIPE_GAP    = 150;
		const PIPE_SPACING = 230;
		const GROUND_H    = 14;
		const BIRD_R      = 14;
		const PIPE_W      = 52;
		const CAP_H       = 14;
		const CAP_EXTRA   = 6;

		// ── State ────────────────────────────────────────────────
		let state = 'idle'; // idle | running | dead
		let bird, pipes, score, stars, groundOffset, wingUp, wingTimer, animId, lastTime;
		let best = Number(localStorage.getItem('flappyBest') || 0);

		// ── Canvas sizing ────────────────────────────────────────
		function resize() {
			const wrap = canvas.parentElement;
			canvas.width  = wrap.clientWidth;
			canvas.height = wrap.clientHeight;
		}

		// ── Init ─────────────────────────────────────────────────
		function initGame() {
			const W = canvas.width, H = canvas.height;
			bird = { x: W * 0.22, y: H / 2, vy: 0, angle: 0 };
			pipes = [];
			score = 0;
			groundOffset = 0;
			wingUp = false;
			wingTimer = 0;
			// Seed first pipe pairs off-screen right
			for (let i = 0; i < 3; i++) addPipe(W + 60 + i * PIPE_SPACING);
			// Parallax stars
			stars = Array.from({ length: 50 }, () => ({
				x: Math.random() * W,
				y: Math.random() * (H - GROUND_H - 60) + 30,
				r: Math.random() * 1.3 + 0.3,
				brightness: Math.random() * 0.5 + 0.3,
			}));
		}

		function addPipe(x) {
			const H = canvas.height;
			const minY = 70;
			const maxY = H - GROUND_H - PIPE_GAP - 70;
			const gapY = minY + Math.random() * Math.max(0, maxY - minY);
			pipes.push({ x, gapY, scored: false });
		}

		// ── Game loop (delta-time) ───────────────────────────────
		function gameLoop(timestamp) {
			if (state !== 'running') return;
			const rawDelta = timestamp - (lastTime || timestamp);
			const delta = Math.min(rawDelta, 50); // cap spiral-of-death
			lastTime = timestamp;
			update(delta);
			draw();
			animId = requestAnimationFrame(gameLoop);
		}

		function startLoop() {
			lastTime = 0;
			animId = requestAnimationFrame(gameLoop);
		}

		// ── Update ───────────────────────────────────────────────
		function update(delta) {
			const W = canvas.width, H = canvas.height;
			const dt = delta / 16.67; // normalise to 60fps equivalent

			// Bird physics
			bird.vy = Math.min(bird.vy + GRAVITY * dt, 10);
			bird.y  += bird.vy * dt;
			// Angle: tilt nose up on flap, down when falling
			const targetAngle = bird.vy > 0 ? Math.min(75, bird.angle + 4 * dt) : Math.max(-25, bird.angle - 6 * dt);
			bird.angle = targetAngle;

			// Wing animation ~8fps
			wingTimer += delta;
			if (wingTimer >= 125) { wingUp = !wingUp; wingTimer = 0; }

			// Ground scroll (visual)
			groundOffset = (groundOffset + PIPE_SPEED * dt) % 30;

			// Pipes
			for (const p of pipes) {
				p.x -= PIPE_SPEED * dt;
				// Score: bird centre passes pipe right edge
				if (!p.scored && p.x + PIPE_W < bird.x) {
					p.scored = true;
					score++;
					if (score > best) {
						best = score;
						localStorage.setItem('flappyBest', best);
					}
				}
			}
			// Remove off-screen, add new
			if (pipes[0] && pipes[0].x + PIPE_W < 0) {
				pipes.shift();
				addPipe(pipes[pipes.length - 1].x + PIPE_SPACING);
			}

			// Stars parallax
			for (const s of stars) {
				s.x -= PIPE_SPEED * 0.5 * dt;
				if (s.x < 0) s.x = W;
			}

			// Collision
			const groundY = H - GROUND_H;
			if (bird.y + BIRD_R >= groundY || bird.y - BIRD_R <= 0) {
				die();
				return;
			}
			for (const p of pipes) {
				const inX = bird.x + BIRD_R - 4 > p.x && bird.x - BIRD_R + 4 < p.x + PIPE_W;
				const inGap = bird.y + BIRD_R - 4 > p.gapY && bird.y - BIRD_R + 4 < p.gapY + PIPE_GAP;
				if (inX && !inGap) { die(); return; }
			}
		}

		// ── Draw ─────────────────────────────────────────────────
		function draw() {
			const W = canvas.width, H = canvas.height;
			const groundY = H - GROUND_H;

			// Clear
			ctx.clearRect(0, 0, W, H);

			// Sky background
			ctx.fillStyle = '#080D1A';
			ctx.fillRect(0, 0, W, H);

			// Stars (parallax layer)
			for (const s of stars) {
				ctx.beginPath();
				ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
				ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
				ctx.fill();
			}

			// Pipes
			for (const p of pipes) {
				drawPipe(p.x, p.gapY);
			}

			// Ground bar
			ctx.fillStyle = '#1A2A10';
			ctx.fillRect(0, groundY, W, GROUND_H);
			// Ground stripe
			ctx.fillStyle = '#243A18';
			const stripeW = 30;
			for (let x = -(groundOffset % stripeW); x < W; x += stripeW) {
				ctx.fillRect(x, groundY, stripeW / 2, GROUND_H);
			}
			// Ground top border
			ctx.fillStyle = '#2D5016';
			ctx.fillRect(0, groundY, W, 2);

			// Bird
			if (state !== 'idle') {
				drawBird(bird.x, bird.y, bird.angle, wingUp);
			} else {
				// Idle: hover bird gently
				drawBird(canvas.width * 0.22, canvas.height / 2 + Math.sin(Date.now() / 400) * 6, 0, wingUp);
			}

			// Score on canvas (during play)
			if (state === 'running' || state === 'dead') {
				const fontSize = Math.round(H * 0.07);
				ctx.font = `800 ${fontSize}px Inter, sans-serif`;
				ctx.textAlign = 'center';
				ctx.fillStyle = 'rgba(255,255,255,0.9)';
				ctx.shadowColor = 'rgba(0,0,0,0.6)';
				ctx.shadowBlur = 8;
				ctx.fillText(score, W / 2, 80);
				ctx.shadowBlur = 0;

				// Best in top-right (small)
				ctx.font = '700 14px Inter, sans-serif';
				ctx.textAlign = 'right';
				ctx.fillStyle = 'rgba(255,255,255,0.45)';
				ctx.fillText(`Best: ${best}`, W - 14, 24);
			}
		}

		function drawBird(x, y, angle, wingUp) {
			ctx.save();
			ctx.translate(x, y);
			ctx.rotate(angle * Math.PI / 180);

			// Body (yellow circle)
			ctx.beginPath();
			ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
			ctx.fillStyle = '#F6C90E';
			ctx.shadowColor = 'rgba(246,201,14,0.4)';
			ctx.shadowBlur = 8;
			ctx.fill();
			ctx.shadowBlur = 0;

			// Wing
			ctx.beginPath();
			if (wingUp) {
				ctx.ellipse(-3, -(BIRD_R - 5), 7, 4, -0.5, 0, Math.PI * 2);
			} else {
				ctx.ellipse(-3, BIRD_R - 5, 7, 4, 0.5, 0, Math.PI * 2);
			}
			ctx.fillStyle = '#E0A800';
			ctx.fill();

			// Beak (orange triangle pointing right)
			ctx.beginPath();
			ctx.moveTo(BIRD_R - 2, -3);
			ctx.lineTo(BIRD_R + 9, 0);
			ctx.lineTo(BIRD_R - 2, 4);
			ctx.closePath();
			ctx.fillStyle = '#FF8C00';
			ctx.fill();

			// Eye white
			ctx.beginPath();
			ctx.arc(5, -4, 4.5, 0, Math.PI * 2);
			ctx.fillStyle = '#fff';
			ctx.fill();
			// Pupil
			ctx.beginPath();
			ctx.arc(6.5, -4, 2, 0, Math.PI * 2);
			ctx.fillStyle = '#1a1a2e';
			ctx.fill();
			// Eye shine
			ctx.beginPath();
			ctx.arc(7, -5, 0.8, 0, Math.PI * 2);
			ctx.fillStyle = '#fff';
			ctx.fill();

			ctx.restore();
		}

		function drawPipe(x, gapY) {
			const H = canvas.height;
			const groundY = H - GROUND_H;

			// Top pipe body
			ctx.fillStyle = '#2D5016';
			ctx.fillRect(x, 0, PIPE_W, gapY - CAP_H);

			// Top pipe cap (lighter, wider)
			ctx.fillStyle = '#3D6B1E';
			ctx.fillRect(x - CAP_EXTRA, gapY - CAP_H, PIPE_W + CAP_EXTRA * 2, CAP_H);

			// Pipe edge highlight
			ctx.fillStyle = 'rgba(255,255,255,0.08)';
			ctx.fillRect(x + 3, 0, 4, gapY - CAP_H);

			// Bottom pipe body
			ctx.fillStyle = '#2D5016';
			ctx.fillRect(x, gapY + PIPE_GAP + CAP_H, PIPE_W, groundY - (gapY + PIPE_GAP + CAP_H));

			// Bottom pipe cap
			ctx.fillStyle = '#3D6B1E';
			ctx.fillRect(x - CAP_EXTRA, gapY + PIPE_GAP, PIPE_W + CAP_EXTRA * 2, CAP_H);

			// Bottom pipe highlight
			ctx.fillStyle = 'rgba(255,255,255,0.08)';
			ctx.fillRect(x + 3, gapY + PIPE_GAP + CAP_H, 4, groundY - (gapY + PIPE_GAP + CAP_H));
		}

		// ── Die sequence ─────────────────────────────────────────
		function die() {
			state = 'dead';
			cancelAnimationFrame(animId);
			bird.angle = 75; // death pose
			draw();
			setTimeout(() => {
				ovEmoji.textContent = '💀';
				ovTitle.textContent = 'Game Over';
				ovSub.innerHTML = `Score: <strong>${score}</strong>&nbsp;&nbsp;•&nbsp;&nbsp;Best: <strong>${best}</strong>`;
				ovBtn.innerHTML = `<span class="material-icons-round" style="font-size:17px">refresh</span>Try Again`;
				overlay.classList.remove('hidden');
			}, 600);
		}

		// ── Flap ─────────────────────────────────────────────────
		function flap() {
			if (state === 'idle') {
				startRun();
				return;
			}
			if (state === 'running') {
				bird.vy = FLAP_VY;
			}
			if (state === 'dead') {
				startRun();
			}
		}

		function startRun() {
			overlay.classList.add('hidden');
			resize();
			initGame();
			state = 'running';
			startLoop();
		}

		// ── Overlay button ───────────────────────────────────────
		ovBtn.addEventListener('click', () => {
			if (state === 'idle' || state === 'dead') startRun();
		});

		// ── Keyboard controls ────────────────────────────────────
		document.addEventListener('keydown', e => {
			if (e.key === ' ') {
				e.preventDefault();
				flap();
			}
		});

		// ── Touch / click controls ───────────────────────────────
		canvas.addEventListener('click', e => {
			// Don't trigger if clicking the overlay button
			flap();
		});

		canvas.addEventListener('touchstart', e => {
			e.preventDefault();
			flap();
		}, { passive: false });

		// ── Resize ───────────────────────────────────────────────
		let resizeTimer;
		function handleResize() {
			clearTimeout(resizeTimer);
			resizeTimer = setTimeout(() => {
				resize();
				if (state === 'idle') {
					draw();
				} else if (state === 'running' || state === 'dead') {
					// Reset on resize during play — simplest safe approach
					cancelAnimationFrame(animId);
					state = 'idle';
					initGame();
					overlay.classList.remove('hidden');
					ovEmoji.textContent = '🐦';
					ovTitle.textContent = 'Flappy Bird';
					ovSub.innerHTML = 'Tap or press <strong>Space</strong> to flap.<br>Thread through the pipes without crashing.';
					ovBtn.innerHTML = `<span class="material-icons-round" style="font-size:17px">play_arrow</span>Start Game`;
					draw();
				}
			}, 150);
		}

		window.addEventListener('resize', handleResize, { passive: true });
		window.visualViewport?.addEventListener('resize', handleResize, { passive: true });

		// ── Boot ─────────────────────────────────────────────────
		resize();
		initGame();
		// Draw idle animation loop
		function idleTick() {
			if (state === 'idle') {
				draw();
				requestAnimationFrame(idleTick);
			}
		}
		idleTick();
	</script>
</body>

</html>
