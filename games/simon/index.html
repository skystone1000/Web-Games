<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon — Games</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />

    <!-- Bootstrap (layout utilities only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Shared design system — always after Bootstrap -->
    <link rel="stylesheet" href="/assets/css/games.css" />

    <style>
        html,
        body {
            overflow: hidden;
            height: 100%;
        }

        /* Force nav glass — scroll never fires on game pages */
        nav {
            background: rgba(8, 13, 26, 0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 1px 0 var(--border);
        }

        /* Ambient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 70% 40%, rgba(41, 121, 255, 0.14) 0%, transparent 70%),
                radial-gradient(ellipse 45% 45% at 15% 85%, rgba(0, 229, 255, 0.08) 0%, transparent 60%);
        }

        /* ── Overlay ── */
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 20;
            gap: 0.85rem;
            padding: 18px;
            background: rgba(8, 13, 26, 0.82);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        #overlay.hidden {
            display: none !important;
        }

        #ov-emoji {
            font-size: clamp(2.1rem, 8vw, 3.2rem);
        }

        #ov-title {
            font-size: clamp(1.15rem, 4vw, 1.5rem);
            font-weight: 800;
            color: var(--text);
        }

        #ov-sub {
            font-size: 0.85rem;
            color: var(--text2);
            text-align: center;
            max-width: min(440px, 92vw);
            line-height: 1.5;
        }

        #ov-score {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--primary-light);
        }

        #ov-best-label {
            font-size: 0.8rem;
            color: var(--text2);
        }

        /* ── Game viewport ── */
        .game-viewport {
            flex-direction: column;
            padding-top: 66px;
        }

        .game-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 1rem;
            position: relative;
            z-index: 1;
        }

        /* ── Simon board ── */
        .simon-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: min(90vw, 90vh, 500px);
            aspect-ratio: 1;
            position: relative;
            gap: 8px;
            border-radius: var(--r);
            overflow: hidden;
        }

        .quad {
            background: var(--quad-base);
            cursor: pointer;
            transition: background 0.08s ease, transform 0.08s ease, box-shadow 0.08s ease;
            border: none;
            outline: none;
            position: relative;
        }

        .quad:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.4);
            outline-offset: -3px;
        }

        /* Per-quadrant base and lit colours via custom properties */
        #q-red {
            --quad-base: rgba(220, 50, 50, 0.25);
            --quad-lit: rgba(220, 50, 50, 0.9);
            border-radius: var(--r) 0 0 0;
        }

        #q-blue {
            --quad-base: rgba(41, 121, 255, 0.25);
            --quad-lit: rgba(41, 121, 255, 0.9);
            border-radius: 0 var(--r) 0 0;
        }

        #q-yellow {
            --quad-base: rgba(220, 180, 0, 0.25);
            --quad-lit: rgba(220, 180, 0, 0.9);
            border-radius: 0 0 0 var(--r);
        }

        #q-green {
            --quad-base: rgba(50, 200, 80, 0.25);
            --quad-lit: rgba(50, 200, 80, 0.9);
            border-radius: 0 0 var(--r) 0;
        }

        .quad.lit {
            background: var(--quad-lit) !important;
            transform: scale(1.03);
            box-shadow: 0 0 32px var(--quad-lit);
        }

        /* Board wrong-answer shake */
        .simon-board.wrong {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-6px, 0); }
            40% { transform: translate(6px, 0); }
            60% { transform: translate(-4px, 0); }
            80% { transform: translate(4px, 0); }
        }

        /* Disabled state during Simon's playback */
        .simon-board.locked .quad {
            cursor: default;
            pointer-events: none;
        }

        /* ── Center hub ── */
        #center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary-light);
            z-index: 5;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.15s;
            pointer-events: none;
            user-select: none;
            box-shadow: 0 0 0 6px rgba(8, 13, 26, 0.6);
        }

        #center-hub.pop {
            transform: translate(-50%, -50%) scale(1.3);
            color: var(--accent);
        }

        /* ── Stat row ── */
        .stat-row {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.85rem;
            color: var(--text2);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-num {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary-light);
            line-height: 1;
        }

        .stat-lbl {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text3);
        }

        .stat-divider {
            width: 1px;
            height: 32px;
            background: var(--border);
        }

        /* Status pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            padding: 5px 14px;
            border-radius: 50px;
            background: var(--accent-dim);
            border: 1px solid rgba(0, 229, 255, 0.22);
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 800;
            white-space: nowrap;
            transition: background var(--ease), border-color var(--ease), color var(--ease);
        }

        .status-pill.warn {
            background: rgba(220, 50, 50, 0.12);
            border-color: rgba(220, 50, 50, 0.3);
            color: rgba(255, 100, 100, 0.9);
        }

        /* ── Keyboard hint ── */
        .key-hint {
            font-size: 0.72rem;
            color: var(--text3);
            text-align: center;
            line-height: 1.6;
        }

        .key-hint kbd {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.7rem;
            color: var(--text2);
        }

        /* ── Mobile responsive ── */
        @media (max-width: 520px) {
            .game-inner {
                gap: 1rem;
                padding: 0.5rem;
            }

            .stat-row {
                gap: 1rem;
            }

            .stat-num {
                font-size: 1.05rem;
            }

            .key-hint {
                display: none;
            }
        }

        @media (max-height: 600px) {
            .game-inner {
                gap: 0.75rem;
            }

            .key-hint {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- Header placeholder — games.js injects /includes/header.html here -->
    <div id="header-placeholder"></div>

    <div class="game-viewport d-flex">
        <div class="game-inner">

            <!-- Simon board -->
            <div class="simon-board" id="simonBoard" aria-label="Simon game board">

                <!-- Red — top-left -->
                <button class="quad" id="q-red" aria-label="Red button (Q)" data-color="red"></button>

                <!-- Blue — top-right -->
                <button class="quad" id="q-blue" aria-label="Blue button (E)" data-color="blue"></button>

                <!-- Yellow — bottom-left -->
                <button class="quad" id="q-yellow" aria-label="Yellow button (Z)" data-color="yellow"></button>

                <!-- Green — bottom-right -->
                <button class="quad" id="q-green" aria-label="Green button (X)" data-color="green"></button>

                <!-- Center hub — shows current round -->
                <div id="center-hub">1</div>

            </div>

            <!-- Stat row -->
            <div class="stat-row" aria-live="polite" aria-atomic="true">
                <div class="stat-item">
                    <div class="stat-num" id="statRound">0</div>
                    <div class="stat-lbl">Round</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-num" id="statBest">0</div>
                    <div class="stat-lbl">Best</div>
                </div>
                <div class="stat-divider"></div>
                <div class="status-pill" id="statusPill">Ready</div>
            </div>

            <!-- Keyboard shortcut hint -->
            <div class="key-hint">
                <kbd>Q</kbd> Red &nbsp;·&nbsp;
                <kbd>E</kbd> Blue &nbsp;·&nbsp;
                <kbd>Z</kbd> Yellow &nbsp;·&nbsp;
                <kbd>X</kbd> Green
            </div>

        </div>
    </div>

    <!-- Start / Game-over overlay -->
    <div id="overlay" class="d-flex flex-column align-items-center justify-content-center">
        <div id="ov-emoji">🎯</div>
        <div id="ov-title">Simon</div>
        <div id="ov-sub">Watch the colours flash, then repeat in order. Each round adds one more step.</div>
        <div id="ov-score" style="display:none"></div>
        <div id="ov-best-label" style="display:none"></div>
        <button class="btn btn-p d-inline-flex align-items-center gap-2" id="ov-btn">
            <span class="material-icons-round" style="font-size:17px">play_arrow</span>Start Game
        </button>
        <a href="/" class="btn btn-o d-inline-flex align-items-center gap-2" style="margin-top:2px">
            <span class="material-icons-round" style="font-size:17px">arrow_back</span>All Games
        </a>
    </div>

    <script src="/assets/js/games.js"></script>
    <script>
        // ── State ──────────────────────────────────────────────────────────────────
        const COLORS = ['red', 'blue', 'yellow', 'green'];
        const FREQS  = { red: 330, blue: 277, yellow: 220, green: 165 };
        const KEY_MAP = { KeyQ: 'red', KeyE: 'blue', KeyZ: 'yellow', KeyX: 'green' };

        let sequence  = [];
        let playerIdx = 0;
        let round     = 0;
        let phase     = 'idle'; // idle | playing | input | dead
        let best      = Number(localStorage.getItem('simonBest') || 0);
        let audioCtx  = null;

        // ── DOM refs ───────────────────────────────────────────────────────────────
        const board      = document.getElementById('simonBoard');
        const hub        = document.getElementById('center-hub');
        const statusPill = document.getElementById('statusPill');
        const statRound  = document.getElementById('statRound');
        const statBest   = document.getElementById('statBest');
        const overlay    = document.getElementById('overlay');
        const ovEmoji    = document.getElementById('ov-emoji');
        const ovTitle    = document.getElementById('ov-title');
        const ovSub      = document.getElementById('ov-sub');
        const ovScore    = document.getElementById('ov-score');
        const ovBestLbl  = document.getElementById('ov-best-label');
        const ovBtn      = document.getElementById('ov-btn');

        // ── Helpers ────────────────────────────────────────────────────────────────
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function getSpeed(r) {
            if (r <= 5)  return { flash: 400, gap: 200 };
            if (r <= 9)  return { flash: 300, gap: 150 };
            return { flash: 200, gap: 100 };
        }

        // ── Audio ──────────────────────────────────────────────────────────────────
        function ensureAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) { /* silently unavailable */ }
        }

        function playTone(color, duration) {
            try {
                ensureAudio();
                if (!audioCtx) return;
                const osc  = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = FREQS[color];
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) { /* fall back silently */ }
        }

        // ── Visual helpers ─────────────────────────────────────────────────────────
        function setStatus(text, warn = false) {
            statusPill.textContent = text;
            if (warn) {
                statusPill.classList.add('warn');
            } else {
                statusPill.classList.remove('warn');
            }
        }

        function setButtonsEnabled(enabled) {
            if (enabled) {
                board.classList.remove('locked');
            } else {
                board.classList.add('locked');
            }
        }

        function updateHub(r) {
            hub.textContent = r ?? (round + 1);
            hub.classList.remove('pop');
            // Force reflow to restart animation
            void hub.offsetWidth;
            hub.classList.add('pop');
            setTimeout(() => hub.classList.remove('pop'), 300);
        }

        function updateStats() {
            statRound.textContent = round;
            statBest.textContent  = best;
        }

        // ── Flash a button ─────────────────────────────────────────────────────────
        function flashButton(color, duration) {
            return new Promise(resolve => {
                const el = document.getElementById('q-' + color);
                el.classList.add('lit');
                playTone(color, duration / 1000);
                setTimeout(() => {
                    el.classList.remove('lit');
                    resolve();
                }, duration);
            });
        }

        // ── Play Simon's sequence ──────────────────────────────────────────────────
        async function playSequence() {
            phase = 'playing';
            setStatus('Watch…');
            setButtonsEnabled(false);
            const { flash, gap } = getSpeed(round);
            for (const color of sequence) {
                await flashButton(color, flash);
                await delay(gap);
            }
            await delay(800);
            phase = 'input';
            playerIdx = 0;
            setStatus('Your turn!');
            setButtonsEnabled(true);
        }

        // ── Wrong answer ──────────────────────────────────────────────────────────
        function wrongAnswer() {
            phase = 'dead';
            setButtonsEnabled(false);
            board.classList.add('wrong');
            setStatus('Wrong! 😵', true);
            // Flash all buttons red briefly
            COLORS.forEach(c => {
                const el = document.getElementById('q-' + c);
                el.style.background = 'rgba(220,50,50,0.65)';
                setTimeout(() => el.style.background = '', 400);
            });
            setTimeout(() => {
                board.classList.remove('wrong');
                showGameOver();
            }, 1000);
        }

        // ── Player click handler ───────────────────────────────────────────────────
        function handlePlayerClick(color) {
            if (phase !== 'input') return;

            flashButton(color, 200);

            if (color !== sequence[playerIdx]) {
                wrongAnswer();
                return;
            }

            playerIdx++;

            if (playerIdx === sequence.length) {
                // Round complete
                round++;
                if (round > best) {
                    best = round;
                    localStorage.setItem('simonBest', best);
                }
                updateHub(round + 1);
                updateStats();

                setStatus('✓ Nice!');
                setButtonsEnabled(false);

                setTimeout(() => {
                    sequence.push(COLORS[Math.floor(Math.random() * 4)]);
                    playSequence();
                }, 1000);
            }
        }

        // ── Start / restart game ──────────────────────────────────────────────────
        function startGame() {
            ensureAudio();
            sequence  = [COLORS[Math.floor(Math.random() * 4)]];
            playerIdx = 0;
            round     = 0;
            phase     = 'idle';

            updateHub(1);
            updateStats();
            overlay.classList.add('hidden');

            playSequence();
        }

        // ── Overlays ───────────────────────────────────────────────────────────────
        function showGameOver() {
            ovEmoji.textContent  = '😵';
            ovTitle.textContent  = 'Game Over';
            ovSub.textContent    = 'You made it to round ' + round + '.';
            ovScore.textContent  = 'Score: ' + round;
            ovScore.style.display = '';
            ovBestLbl.textContent = 'Best: ' + best;
            ovBestLbl.style.display = '';
            ovBtn.innerHTML = '<span class="material-icons-round" style="font-size:17px">replay</span>Try Again';

            overlay.classList.remove('hidden');
        }

        function showIdle() {
            ovEmoji.textContent  = '🎯';
            ovTitle.textContent  = 'Simon';
            ovSub.textContent    = 'Watch the colours flash, then repeat in order. Each round adds one more step.';
            ovScore.style.display    = 'none';
            ovBestLbl.style.display  = 'none';
            ovBtn.innerHTML = '<span class="material-icons-round" style="font-size:17px">play_arrow</span>Start Game';
        }

        // ── Event listeners ────────────────────────────────────────────────────────
        // Quadrant click
        COLORS.forEach(color => {
            document.getElementById('q-' + color).addEventListener('click', () => {
                handlePlayerClick(color);
            });
        });

        // Overlay button
        ovBtn.addEventListener('click', () => {
            startGame();
        });

        // Keyboard controls
        document.addEventListener('keydown', e => {
            const color = KEY_MAP[e.code];
            if (!color) return;
            e.preventDefault();
            if (phase === 'input') {
                handlePlayerClick(color);
            } else if (phase === 'idle' || phase === 'dead') {
                // Allow keyboard to start/restart if overlay visible
                if (!overlay.classList.contains('hidden')) {
                    startGame();
                }
            }
        });

        // ── Initial render ─────────────────────────────────────────────────────────
        statBest.textContent = best;
        showIdle();
    </script>
</body>

</html>
