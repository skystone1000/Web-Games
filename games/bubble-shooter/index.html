<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bubble Shooter — Games</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />

    <!-- Bootstrap (layout utilities only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Shared design system — always after Bootstrap -->
    <link rel="stylesheet" href="/assets/css/games.css" />

    <style>
        /* REQUIRED: no scroll on game pages */
        html, body {
            overflow: hidden;
            height: 100%;
            overscroll-behavior: none;
        }

        body {
            position: fixed;
            inset: 0;
            touch-action: none;
        }

        /* REQUIRED: always-on nav glass */
        nav {
            background: rgba(8, 13, 26, 0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 1px 0 var(--border);
        }

        /* REQUIRED: ambient background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 70% 40%, rgba(41,121,255,0.14) 0%, transparent 70%),
                radial-gradient(ellipse 45% 45% at 15% 85%, rgba(0,229,255,0.08) 0%, transparent 60%);
        }

        .game-viewport {
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            max-height: 100vh;
            max-height: 100dvh;
            overflow: hidden;
            padding-top: 66px;
        }

        #canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        /* Overlay (start / pause / game-over / level-complete) */
        #overlay {
            position: absolute;
            inset: 0;
            gap: 0.85rem;
            padding: 18px;
            background: rgba(8, 13, 26, 0.82);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 10;
        }

        #overlay.hidden {
            display: none !important;
        }

        /* Controls hint */
        .hints {
            position: absolute;
            bottom: 12px;
            right: 16px;
            gap: 10px;
            pointer-events: none;
            z-index: 5;
        }

        .hint {
            gap: 4px;
            font-size: 0.68rem;
            color: var(--text3);
        }

        .k {
            display: inline-block;
            padding: 1px 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text2);
        }

        @media (max-width: 540px) {
            .hints { display: none !important; }
        }

        @media (max-height: 480px) {
            #overlay { gap: 0.4rem; }
            #ov-emoji { display: none; }
        }
    </style>
</head>
<body>
    <!-- Header placeholder — games.js injects /includes/header.html here -->
    <div id="header-placeholder"></div>

    <div class="game-viewport">
        <div id="canvas-wrap">
            <canvas id="game-canvas"></canvas>

            <!-- Overlay (start / pause / game-over / level-complete) -->
            <div id="overlay" class="d-flex flex-column align-items-center justify-content-center">
                <div id="ov-emoji" style="font-size:clamp(2.1rem,8vw,3.2rem);line-height:1">🫧</div>
                <div id="ov-title" style="font-size:clamp(1.15rem,4vw,1.5rem);font-weight:800;color:var(--text)">Bubble Shooter</div>
                <div id="ov-sub" style="font-size:0.85rem;color:var(--text2);text-align:center;max-width:min(440px,92vw);line-height:1.5">
                    Aim with your mouse or touch. Click to fire. Match 3 or more same-colour bubbles to pop them!
                </div>
                <button class="btn btn-p d-inline-flex align-items-center gap-2" id="ov-btn" style="margin-top:0.35rem">
                    <span class="material-icons-round" style="font-size:17px">play_arrow</span>Start Game
                </button>
            </div>

            <!-- Controls hint -->
            <div class="hints d-flex">
                <span class="hint d-inline-flex align-items-center"><span class="k">Mouse</span> aim</span>
                <span class="hint d-inline-flex align-items-center"><span class="k">Click</span> fire</span>
                <span class="hint d-inline-flex align-items-center"><span class="k">Space</span> pause</span>
            </div>
        </div>
    </div>

    <script src="/assets/js/games.js"></script>
    <script>
    // ── Constants ──────────────────────────────────────────────────────────────
    const COLORS = ['#2979FF', '#00E5FF', '#E03010', '#D4A800', '#32C850'];
    const GRID_ROWS = 12;
    const GRID_COLS = 11;
    const SHOOTER_SPEED = 11;

    // ── State ──────────────────────────────────────────────────────────────────
    let state = 'idle'; // idle | running | paused | dead | levelcomplete
    const canvas = document.getElementById('game-canvas');
    const ctx    = canvas.getContext('2d');
    const wrap   = document.getElementById('canvas-wrap');
    let R = 22; // bubble radius — recalculated on resize
    let grid;   // grid[row][col] = color string or null
    let score = 0;
    let best2 = Number(localStorage.getItem('bubbleBest') || 0);
    let level = 1;
    let shotsSinceLastPop = 0;
    let animId = null;
    let lastTs = 0;
    let particles = [];
    let flyBubble = null; // {x, y, vx, vy, color}
    let shooter = { color: null, next: null, angle: -Math.PI / 2 };
    // Track whether a wall bounce has occurred for the current shot
    let flyBounced = false;

    // ── DOM refs ───────────────────────────────────────────────────────────────
    const overlay = document.getElementById('overlay');
    const ovEmoji = document.getElementById('ov-emoji');
    const ovTitle = document.getElementById('ov-title');
    const ovSub   = document.getElementById('ov-sub');
    const ovBtn   = document.getElementById('ov-btn');

    // ── Canvas init & resize ───────────────────────────────────────────────────
    function initCanvas() {
        resize();
    }

    function resize() {
        canvas.width  = wrap.clientWidth;
        canvas.height = wrap.clientHeight;
        // Recalculate R based on canvas width so grid fits
        // GRID_COLS bubbles across, each 2R wide, plus margin
        R = Math.max(14, Math.min(22, Math.floor((canvas.width - 20) / (GRID_COLS * 2 + 1))));
    }

    // ── Hex grid math ─────────────────────────────────────────────────────────
    function hexPos(row, col) {
        // Center the grid horizontally in the canvas
        const xOffset = canvas.width / 2 - (GRID_COLS - 1) * R;
        const x = xOffset + col * R * 2 + (row % 2 === 1 ? R : 0);
        const y = row * R * 1.73 + R + 50;
        return { x, y };
    }

    function hexNeighbours(row, col) {
        const odd = row % 2 === 1;
        return [
            [row - 1, col + (odd ? 0 : -1)],
            [row - 1, col + (odd ? 1 : 0)],
            [row,     col - 1],
            [row,     col + 1],
            [row + 1, col + (odd ? 0 : -1)],
            [row + 1, col + (odd ? 1 : 0)],
        ].filter(([r, c]) => r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS);
    }

    function bfsCluster(sr, sc, color) {
        const vis = new Set([sr + ',' + sc]);
        const q   = [[sr, sc]];
        while (q.length) {
            const [r, c] = q.shift();
            for (const [nr, nc] of hexNeighbours(r, c)) {
                const k = nr + ',' + nc;
                if (!vis.has(k) && grid[nr] && grid[nr][nc] === color) {
                    vis.add(k);
                    q.push([nr, nc]);
                }
            }
        }
        return [...vis].map(k => k.split(',').map(Number));
    }

    function bfsConnected() {
        const vis = new Set();
        const q   = [];
        for (let c = 0; c < GRID_COLS; c++) {
            if (grid[0] && grid[0][c]) {
                const k = '0,' + c;
                if (!vis.has(k)) { vis.add(k); q.push([0, c]); }
            }
        }
        while (q.length) {
            const [r, c] = q.shift();
            for (const [nr, nc] of hexNeighbours(r, c)) {
                const k = nr + ',' + nc;
                if (!vis.has(k) && grid[nr] && grid[nr][nc]) {
                    vis.add(k);
                    q.push([nr, nc]);
                }
            }
        }
        return vis;
    }

    // ── Grid init ──────────────────────────────────────────────────────────────
    function initGrid(lv) {
        grid = Array.from({ length: GRID_ROWS }, () => Array(GRID_COLS).fill(null));
        const rows = Math.min(4 + lv, GRID_ROWS - 3);
        for (let r = 0; r < rows; r++) {
            const cols = GRID_COLS - (r % 2); // odd rows have one fewer column
            for (let c = 0; c < cols; c++) {
                grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
            }
        }
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    function rndColor() {
        return COLORS[Math.floor(Math.random() * COLORS.length)];
    }

    function colorsInGrid() {
        const s = new Set();
        for (let r = 0; r < GRID_ROWS; r++)
            for (let c = 0; c < GRID_COLS; c++)
                if (grid[r] && grid[r][c]) s.add(grid[r][c]);
        return s;
    }

    function smartRndColor() {
        // Pick a colour that exists in the grid (if any remain) to keep game fair
        const present = [...colorsInGrid()];
        if (present.length === 0) return rndColor();
        return present[Math.floor(Math.random() * present.length)];
    }

    function checkWin() {
        for (let r = 0; r < GRID_ROWS; r++)
            for (let c = 0; c < GRID_COLS; c++)
                if (grid[r] && grid[r][c]) return false;
        return true;
    }

    function checkGameOver() {
        const dangerY = canvas.height - 90;
        for (let r = 0; r < GRID_ROWS; r++) {
            for (let c = 0; c < GRID_COLS; c++) {
                if (grid[r] && grid[r][c]) {
                    const p = hexPos(r, c);
                    if (p.y + R >= dangerY) {
                        showGameOver();
                        return true;
                    }
                }
            }
        }
        return false;
    }

    function descendGrid() {
        // Shift every row down by one (add an empty top row)
        grid.unshift(Array(GRID_COLS).fill(null));
        if (grid.length > GRID_ROWS) grid.pop();
    }

    // ── Aiming ─────────────────────────────────────────────────────────────────
    function updateAim(mx, my) {
        const sx = canvas.width / 2;
        const sy = canvas.height - 50;
        let a = Math.atan2(my - sy, mx - sx);
        // Clamp: no aiming into bottom hemisphere, keep >=10° from horizontal
        if (a > -0.175)        a = -0.175;
        if (a < -Math.PI + 0.175) a = -Math.PI + 0.175;
        shooter.angle = a;
    }

    // ── Firing ─────────────────────────────────────────────────────────────────
    function fire() {
        if (flyBubble || state !== 'running') return;
        const sx  = canvas.width / 2;
        const sy  = canvas.height - 50;
        flyBubble = {
            x: sx, y: sy,
            vx: Math.cos(shooter.angle) * SHOOTER_SPEED,
            vy: Math.sin(shooter.angle) * SHOOTER_SPEED,
            color: shooter.color,
        };
        flyBounced = false;
        shooter.color = shooter.next;
        shooter.next  = smartRndColor();
        shotsSinceLastPop++;
    }

    // ── Place bubble after collision ───────────────────────────────────────────
    function placeBubble(hitR, hitC) {
        // Find the nearest empty cell in the vicinity of the hit
        let best3 = null, bd = Infinity;
        const rMin = Math.max(0, hitR - 2);
        const rMax = Math.min(GRID_ROWS - 1, hitR + 2);
        for (let r = rMin; r <= rMax; r++) {
            const cols = GRID_COLS - (r % 2);
            for (let c = 0; c < cols; c++) {
                if (!grid[r] || grid[r][c] !== null) continue;
                const p = hexPos(r, c);
                const d = Math.hypot(flyBubble.x - p.x, flyBubble.y - p.y);
                if (d < bd) { bd = d; best3 = [r, c]; }
            }
        }

        // Fallback: scan all empty cells in first 3 rows above hit
        if (!best3) {
            for (let r = 0; r < GRID_ROWS; r++) {
                const cols = GRID_COLS - (r % 2);
                for (let c = 0; c < cols; c++) {
                    if (!grid[r] || grid[r][c] !== null) continue;
                    const p = hexPos(r, c);
                    const d = Math.hypot(flyBubble.x - p.x, flyBubble.y - p.y);
                    if (d < bd) { bd = d; best3 = [r, c]; }
                }
            }
        }

        if (!best3) { flyBubble = null; return; }

        const [pr, pc] = best3;
        if (!grid[pr]) grid[pr] = Array(GRID_COLS).fill(null);
        grid[pr][pc] = flyBubble.color;
        flyBubble = null;

        // BFS cluster check
        const cluster = bfsCluster(pr, pc, grid[pr][pc]);
        if (cluster.length >= 3) {
            cluster.forEach(([r, c]) => { addPop(r, c, grid[r][c]); grid[r][c] = null; });
            score += cluster.length * 10;

            // Drop floating bubbles
            const connected = bfsConnected();
            let drops = 0;
            for (let r = 1; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    if (grid[r] && grid[r][c] && !connected.has(r + ',' + c)) {
                        addDrop(r, c, grid[r][c]);
                        grid[r][c] = null;
                        drops++;
                    }
                }
            }
            score += drops * 20;

            if (score > best2) {
                best2 = score;
                localStorage.setItem('bubbleBest', best2);
            }
            shotsSinceLastPop = 0;

            if (checkWin()) {
                setTimeout(() => showLevelComplete(), 600);
                return;
            }
        } else if (shotsSinceLastPop > 0 && shotsSinceLastPop % 10 === 0) {
            descendGrid();
        }

        checkGameOver();
    }

    // ── Update flying bubble ───────────────────────────────────────────────────
    function updateFly() {
        if (!flyBubble) return;

        flyBubble.x += flyBubble.vx;
        flyBubble.y += flyBubble.vy;

        // Wall bounces (one bounce only) — walls align with grid edges
        const wallLeft  = canvas.width / 2 - GRID_COLS * R;
        const wallRight = canvas.width / 2 + GRID_COLS * R;
        if (flyBubble.x - R < wallLeft) {
            flyBubble.x = wallLeft + R;
            flyBubble.vx = Math.abs(flyBubble.vx);
            flyBounced = true;
        }
        if (flyBubble.x + R > wallRight) {
            flyBubble.x = wallRight - R;
            flyBubble.vx = -Math.abs(flyBubble.vx);
            flyBounced = true;
        }

        // Reached ceiling row
        if (flyBubble.y - R < 50) {
            const xOffset = canvas.width / 2 - (GRID_COLS - 1) * R;
            const col = Math.round((flyBubble.x - xOffset) / (R * 2));
            placeBubble(0, Math.max(0, Math.min(GRID_COLS - 1, col)));
            return;
        }

        // Check collision with existing grid bubbles
        for (let r = 0; r < GRID_ROWS; r++) {
            for (let c = 0; c < GRID_COLS; c++) {
                if (grid[r] && grid[r][c]) {
                    const p = hexPos(r, c);
                    if (Math.hypot(flyBubble.x - p.x, flyBubble.y - p.y) < R * 1.85) {
                        placeBubble(r, c);
                        return;
                    }
                }
            }
        }

        // Fell off screen (shouldn't happen due to angle clamping but just in case)
        if (flyBubble.y > canvas.height + R * 2) {
            flyBubble = null;
        }
    }

    // ── Particles ──────────────────────────────────────────────────────────────
    function addPop(r, c, color) {
        const { x, y } = hexPos(r, c);
        for (let i = 0; i < 8; i++) {
            const a   = (i / 8) * Math.PI * 2;
            const spd = 1.5 + Math.random() * 2.5;
            particles.push({
                x, y,
                vx: Math.cos(a) * spd,
                vy: Math.sin(a) * spd,
                color,
                life: 1, maxLife: 1,
                type: 'pop',
                r: 4 + Math.random() * 4,
            });
        }
    }

    function addDrop(r, c, color) {
        const { x, y } = hexPos(r, c);
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 1.5,
            vy: -1,
            vy2: 0,
            color,
            life: 1, maxLife: 1,
            type: 'drop',
            r: R - 2,
        });
    }

    // ── Draw bubble (3D glass) ─────────────────────────────────────────────────
    function drawBubble(x, y, color, alpha, radius) {
        if (alpha === undefined) alpha  = 1;
        if (radius === undefined) radius = R;
        ctx.save();
        ctx.globalAlpha = alpha;
        const ri = parseInt(color.slice(1, 3), 16);
        const gi = parseInt(color.slice(3, 5), 16);
        const bi = parseInt(color.slice(5, 7), 16);
        const lighter = `rgb(${Math.min(255, ri + 80)},${Math.min(255, gi + 80)},${Math.min(255, bi + 80)})`;
        const g = ctx.createRadialGradient(
            x - radius * 0.3, y - radius * 0.3, radius * 0.05,
            x, y, radius
        );
        g.addColorStop(0, lighter);
        g.addColorStop(1, color);
        ctx.beginPath();
        ctx.arc(x, y, radius - 1, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
        // Specular highlight
        ctx.beginPath();
        ctx.arc(x - radius * 0.3, y - radius * 0.35, radius * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        ctx.fill();
        ctx.restore();
    }

    // ── Draw aim guide ─────────────────────────────────────────────────────────
    function drawAimGuide() {
        const sx = canvas.width / 2;
        const sy = canvas.height - 50;
        ctx.save();
        ctx.setLineDash([7, 7]);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth   = 2;

        let x = sx, y = sy;
        let vx = Math.cos(shooter.angle);
        let vy = Math.sin(shooter.angle);
        let bounced = false;
        let bounceX = null, bounceY = null;
        const wallLeft  = canvas.width / 2 - GRID_COLS * R;
        const wallRight = canvas.width / 2 + GRID_COLS * R;

        for (let i = 0; i < 600; i++) {
            x += vx * 1.5;
            y += vy * 1.5;
            if (x - R < wallLeft && !bounced) {
                x = wallLeft + R;
                bounceX = x; bounceY = y;
                vx = Math.abs(vx);
                bounced = true;
            }
            if (x + R > wallRight && !bounced) {
                x = wallRight - R;
                bounceX = x; bounceY = y;
                vx = -Math.abs(vx);
                bounced = true;
            }
            if (y < 50) break;

            // Stop if line hits a bubble
            let hit = false;
            for (let r = 0; r < GRID_ROWS && !hit; r++) {
                for (let c = 0; c < GRID_COLS && !hit; c++) {
                    if (grid[r] && grid[r][c]) {
                        const p = hexPos(r, c);
                        if (Math.hypot(x - p.x, y - p.y) < R * 1.8) hit = true;
                    }
                }
            }
            if (hit) break;
        }

        // Draw two segments when bounced so the guide visually matches the cursor direction
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        if (bounced && bounceX !== null) ctx.lineTo(bounceX, bounceY);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    }

    // ── Main draw ──────────────────────────────────────────────────────────────
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Grid bubbles
        for (let r = 0; r < GRID_ROWS; r++) {
            for (let c = 0; c < GRID_COLS; c++) {
                if (grid[r] && grid[r][c]) {
                    const p = hexPos(r, c);
                    drawBubble(p.x, p.y, grid[r][c]);
                }
            }
        }

        // Particles
        for (const p of particles) {
            const t = p.life / p.maxLife;
            ctx.save();
            ctx.globalAlpha = t * (p.type === 'drop' ? 0.9 : 1);
            const ri = parseInt(p.color.slice(1, 3), 16);
            const gi = parseInt(p.color.slice(3, 5), 16);
            const bi = parseInt(p.color.slice(5, 7), 16);
            if (p.type === 'pop') {
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur  = 8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * t, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Falling drop
                const lighter = `rgb(${Math.min(255, ri + 60)},${Math.min(255, gi + 60)},${Math.min(255, bi + 60)})`;
                const g2 = ctx.createRadialGradient(p.x - p.r * 0.3, p.y - p.r * 0.3, 1, p.x, p.y, p.r);
                g2.addColorStop(0, lighter);
                g2.addColorStop(1, p.color);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * Math.max(0.1, t), 0, Math.PI * 2);
                ctx.fillStyle = g2;
                ctx.fill();
            }
            ctx.restore();
        }

        // Aim guide
        if (state === 'running') {
            drawAimGuide();
        }

        // Flying bubble
        if (flyBubble) {
            drawBubble(flyBubble.x, flyBubble.y, flyBubble.color);
        }

        // Danger line
        const dangerY = canvas.height - 90;
        ctx.save();
        ctx.strokeStyle = 'rgba(239,68,68,0.4)';
        ctx.lineWidth   = 1;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(0, dangerY);
        ctx.lineTo(canvas.width, dangerY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        // Shooter area background
        const sx = canvas.width / 2;
        const sy = canvas.height - 50;

        ctx.save();
        ctx.fillStyle = 'rgba(8,13,26,0.55)';
        ctx.beginPath();
        ctx.arc(sx, sy, R * 1.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth   = 1;
        ctx.stroke();
        ctx.restore();

        // Current bubble in shooter
        if (shooter.color) {
            drawBubble(sx, sy, shooter.color);
        }

        // Next bubble preview
        const previewX = sx + R * 3.5;
        const previewY = sy;
        if (shooter.next) {
            ctx.save();
            ctx.fillStyle = 'rgba(8,13,26,0.45)';
            ctx.beginPath();
            ctx.arc(previewX, previewY, R * 1.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
            drawBubble(previewX, previewY, shooter.next, 0.8, R * 0.72);
            // "NEXT" label
            ctx.fillStyle = 'rgba(138,153,179,0.7)';
            ctx.font = `600 ${Math.max(9, R * 0.5)}px Inter,sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText('NEXT', previewX, previewY + R * 2);
        }

        // HUD — score, best, level
        ctx.save();
        ctx.fillStyle = 'rgba(8,13,26,0.6)';
        roundRect(ctx, 0, 0, canvas.width, 44, 0);
        ctx.fill();
        ctx.fillStyle = '#E8EDF5';
        ctx.font      = `700 ${Math.max(12, R * 0.72)}px Inter,sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText('SCORE  ' + score, 16, 28);
        ctx.textAlign = 'right';
        ctx.fillText('BEST  ' + best2, canvas.width - 16, 28);
        ctx.textAlign = 'center';
        ctx.fillStyle = 'var(--accent)';
        ctx.fillText('LEVEL  ' + level, canvas.width / 2, 28);
        ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        if (ctx.roundRect) {
            ctx.roundRect(x, y, w, h, r);
        } else {
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
        }
    }

    // ── Game loop ──────────────────────────────────────────────────────────────
    function loop(ts) {
        if (state !== 'running') return;
        const dt = Math.min((ts - lastTs) / 16.67, 3);
        lastTs = ts;

        updateFly();

        // Update particles
        for (const p of particles) {
            p.life -= dt * 0.04;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            if (p.type === 'drop') {
                p.vy2 = (p.vy2 || 0) + 0.4 * dt;
                p.y  += p.vy2 * dt;
            }
        }
        particles = particles.filter(p => p.life > 0);

        draw();
        animId = requestAnimationFrame(loop);
    }

    // ── Game lifecycle ─────────────────────────────────────────────────────────
    function startGame() {
        cancelAnimationFrame(animId);
        animId = null;
        resize();
        score = 0;
        level = 1;
        shotsSinceLastPop = 0;
        particles = [];
        flyBubble = null;
        initGrid(level);
        shooter.color = smartRndColor();
        shooter.next  = smartRndColor();
        shooter.angle = -Math.PI / 2;
        overlay.classList.add('hidden');
        state  = 'running';
        lastTs = performance.now();
        animId = requestAnimationFrame(loop);
    }

    function showGameOver() {
        state = 'dead';
        cancelAnimationFrame(animId);
        animId = null;
        draw();
        ovEmoji.textContent = '💀';
        ovTitle.textContent = 'Game Over';
        ovSub.textContent   = `Score: ${score}   Best: ${best2}`;
        ovBtn.innerHTML     = `<span class="material-icons-round" style="font-size:17px">refresh</span>Try Again`;
        overlay.classList.remove('hidden');
    }

    function showLevelComplete() {
        if (state !== 'running') return;
        state = 'levelcomplete';
        cancelAnimationFrame(animId);
        animId = null;
        draw();
        level++;
        ovEmoji.textContent = '🎉';
        ovTitle.textContent = 'Level ' + (level - 1) + ' Clear!';
        ovSub.textContent   = `Score: ${score}   Best: ${best2}. Ready for Level ${level}?`;
        ovBtn.innerHTML     = `<span class="material-icons-round" style="font-size:17px">play_arrow</span>Next Level`;
        overlay.classList.remove('hidden');
    }

    function nextLevel() {
        cancelAnimationFrame(animId);
        animId = null;
        resize();
        shotsSinceLastPop = 0;
        particles = [];
        flyBubble = null;
        initGrid(level);
        shooter.color = smartRndColor();
        shooter.next  = smartRndColor();
        shooter.angle = -Math.PI / 2;
        overlay.classList.add('hidden');
        state  = 'running';
        lastTs = performance.now();
        animId = requestAnimationFrame(loop);
    }

    function togglePause() {
        if (state === 'running') {
            state = 'paused';
            cancelAnimationFrame(animId);
            animId = null;
            draw();
            ovEmoji.textContent = '⏸';
            ovTitle.textContent = 'Paused';
            ovSub.textContent   = 'Press Space or click Resume to continue.';
            ovBtn.innerHTML     = `<span class="material-icons-round" style="font-size:17px">play_arrow</span>Resume`;
            overlay.classList.remove('hidden');
        } else if (state === 'paused') {
            state  = 'running';
            lastTs = performance.now();
            overlay.classList.add('hidden');
            animId = requestAnimationFrame(loop);
        }
    }

    // ── Input ──────────────────────────────────────────────────────────────────
    // Mouse
    canvas.addEventListener('mousemove', e => {
        if (state !== 'running') return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width  / rect.width;
        const scaleY = canvas.height / rect.height;
        updateAim((e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY);
    });

    canvas.addEventListener('click', e => {
        if (state !== 'running') return;
        fire();
    });

    // Touch
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (state !== 'running') return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width  / rect.width;
        const scaleY = canvas.height / rect.height;
        const t = e.touches[0];
        updateAim((t.clientX - rect.left) * scaleX, (t.clientY - rect.top) * scaleY);
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        if (state !== 'running') return;
        fire();
    }, { passive: false });

    // Keyboard
    document.addEventListener('keydown', e => {
        if (e.key === ' ') {
            e.preventDefault();
            if (state === 'idle' || state === 'dead' || state === 'levelcomplete') {
                // handled by button
            } else {
                togglePause();
            }
        }
        if (e.key === 'Enter' && (state === 'idle' || state === 'dead' || state === 'levelcomplete')) {
            ovBtn.click();
        }
    });

    // Overlay button
    ovBtn.addEventListener('click', () => {
        if (state === 'idle' || state === 'dead') {
            startGame();
        } else if (state === 'paused') {
            togglePause();
        } else if (state === 'levelcomplete') {
            nextLevel();
        }
    });

    // ── Resize ─────────────────────────────────────────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            resize();
            if (state !== 'running') draw();
        }, 100);
    }, { passive: true });
    window.visualViewport?.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            resize();
            if (state !== 'running') draw();
        }, 100);
    }, { passive: true });

    // ── Boot ───────────────────────────────────────────────────────────────────
    initCanvas();
    // Draw a static preview frame so the canvas isn't blank behind the overlay
    initGrid(1);
    shooter.color = smartRndColor();
    shooter.next  = smartRndColor();
    draw();
    </script>
</body>
</html>
